<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Message Idol</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 400px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #header { background: #ff69b4; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #messages { height: 400px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .idol { background: #ffe4e1; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #0084ff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        #input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { margin-left: 5px; background: #ff69b4; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">💖 PM Bareng Hana 💖</div>
    <div id="messages">
        <div class="msg idol">Halo Kakak! Makasih ya udah subscribe PM aku! ✨</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Ketik pesan...">
        <button onclick="kirimPesan()">Kirim</button>
    </div>
</div>

<script type="importmap">
  { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
  import { GoogleGenerativeAI } from "@google/generative-ai";

  // MASUKKAN API KEY KAMU DI SINI
  const API_KEY = "AIzaSyDQyDasfI1CZuECi9c8-o0O3R9Mgb_aAR8"; 
  const genAI = new GoogleGenerativeAI(API_KEY);

  // SETTING KARAKTER IDOL
  const model = genAI.getGenerativeModel({ 
    model: "gemini-1.5-flash",
    systemInstruction: "Kamu adalah Hana, member idol Luna-48. Kamu ceria, suka pakai emoji, dan memanggil fans 'Kakak'. Jawab dengan santai dan pendek-pendek."
  });

  const chat = model.startChat({ history: [] });

  window.kirimPesan = async async => {
    const input = document.getElementById("userInput");
    const msgDiv = document.getElementById("messages");
    if (!input.value) return;

    // Tampilkan pesan user
    msgDiv.innerHTML += `<div class="msg user">${input.value}</div>`;
    const text = input.value;
    input.value = "";

    try {
        const result = await chat.sendMessage(text);
        const response = await result.response;
        // Tampilkan balasan idol
        msgDiv.innerHTML += `<div class="msg idol">${response.text()}</div>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;
    } catch (e) {
        msgDiv.innerHTML += `<div class="msg idol">Duh, koneksi aku lagi keganggu nih, Kak... 😭</div>`;
    }
  }
</script>

</body>
</html>
