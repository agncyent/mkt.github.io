<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLP48 Member Page</title>
    <style>
        /* --- CSS BAGIAN --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e8f5e9; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background-color: #ffffff;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        select {
            padding: 5px 10px;
            border-radius: 5px;
            border: 2px solid #28a745;
            color: #28a745;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            background: white;
        }

        .container {
            max-width: 900px; /* Diperlebar sedikit agar muat 3 foto dengan lega */
            width: 95%;
            text-align: center;
            padding: 40px 0;
        }

        .main-title {
            color: #28a745;
            font-size: 22px;
            letter-spacing: 3px;
            margin: 0;
            text-transform: uppercase;
        }

        .underline {
            width: 50px;
            height: 3px;
            background-color: #28a745;
            margin: 10px auto 30px;
        }

        .gen-title {
            color: #1b5e20;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 40px;
        }

        /* --- GRID MEMBER (Kunci Kerapihan) --- */
        .member-grid {
            display: grid;
            /* Default Mobile: 2 kolom */
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px 20px; /* Jarak antar baris 30px, antar kolom 20px */
            justify-items: center;
        }

        /* Responsive Desktop: 3 kolom (Atas 3, Bawah 3) */
        @media (min-width: 768px) {
            .member-grid {
                grid-template-columns: repeat(3, 1fr); 
                padding: 0 50px;
            }
        }

        .member-link {
            text-decoration: none;
            color: inherit;
            display: block;
            width: 100%;
            max-width: 180px; /* Ukuran kotak diperbesar dikit agar lebih jelas */
        }

        .img-box {
            border: 2.5px solid #28a745;
            border-radius: 15px;
            overflow: hidden;
            background-color: #fff;
            aspect-ratio: 3 / 4;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .member-link:hover .img-box {
            transform: translateY(-10px); /* Efek melayang saat di-hover */
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
            border-color: #218838;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-name {
            margin-top: 15px;
            color: #1b5e20;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <header>
        <select id="langSelector" onchange="changeLanguage()">
            <option value="en">English</option>
            <option value="id">Indonesia</option>
            <option value="ms">Melayu</option>
            <option value="ja">Japanese</option>
        </select>
    </header>

    <div class="container">
        <h2 class="main-title" id="txt-member">MEMBER</h2>
        <div class="underline"></div>
        
        <h3 class="gen-title" id="txt-gen">KLP48 1st Generation Members</h3>

        <div class="member-grid">
            
            <a href="https://yurina.github.io" class="member-link">
                <div class="img-box"><img src="yurina.jpg" alt="Yurina"></div>
                <p class="member-name">Yurina</p>
            </a>

            <a href="https://suzuha.github.io" class="member-link">
                <div class="img-box"><img src="suzuha.jpg" alt="Suzuha"></div>
                <p class="member-name">Suzuha</p>
            </a>

            <a href="https://devi.github.io" class="member-link">
                <div class="img-box"><img src="devi.jpg" alt="Devi"></div>
                <p class="member-name">Devi</p>
            </a>

            <a href="https://haruka.github.io" class="member-link">
                <div class="img-box"><img src="haruka.jpg" alt="Haruka"></div>
                <p class="member-name">Haruka</p>
            </a>

            <a href="https://cocoa.github.io" class="member-link">
                <div class="img-box"><img src="cocoa.jpg" alt="Cocoa"></div>
                <p class="member-name">Cocoa</p>
            </a>

            <a href="https://yishyan.github.io" class="member-link">
                <div class="img-box"><img src="yishyan.jpg" alt="Yi Shyan"></div>
                <p class="member-name">Yi Shyan</p>
            </a>

        </div>
    </div>

    <script>
        const translations = {
            'en': {
                'member': 'MEMBER',
                'gen': 'KLP48 1st Generation Members'
            },
            'id': {
                'member': 'ANGGOTA',
                'gen': 'Anggota Generasi ke-1 KLP48'
            },
            'ms': {
                'member': 'AHLI',
                'gen': 'Ahli Generasi Pertama KLP48'
            },
            'ja': {
                'member': 'メンバー',
                'gen': 'KLP48 第1期生メンバー'
            }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelector').value;
            document.getElementById('txt-member').innerText = translations[lang].member;
            document.getElementById('txt-gen').innerText = translations[lang].gen;
        }
    </script>

</body>
</html>
