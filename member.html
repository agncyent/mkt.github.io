<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLP48 Member Page</title>
    <style>
        /* --- CSS BAGIAN --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e8f5e9; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background-color: #ffffff;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        select {
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #28a745;
            color: #28a745;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }

        .container {
            max-width: 800px;
            width: 90%;
            text-align: center;
            padding: 40px 0;
        }

        .main-title {
            color: #28a745;
            font-size: 20px;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        .underline {
            width: 60px;
            height: 2px;
            background-color: #28a745;
            margin: 8px auto 30px;
        }

        .gen-title {
            color: #1b5e20;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* Grid Member */
        .member-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px;
            justify-items: center;
        }

        /* Menghilangkan dekorasi link */
        .member-link {
            text-decoration: none;
            color: inherit;
            display: block;
            width: 100%;
            max-width: 160px;
        }

        .member-card {
            width: 100%;
        }

        .img-box {
            border: 2px solid #28a745;
            border-radius: 12px;
            overflow: hidden;
            background-color: #fff;
            aspect-ratio: 3 / 4;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Efek saat foto disentuh/diarahkan kursor */
        .member-link:hover .img-box {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-name {
            margin-top: 10px;
            color: #1b5e20;
            font-weight: bold;
            font-size: 14px;
        }

        /* Responsif untuk layar lebih besar */
        @media (min-width: 768px) {
            .member-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>

    <header>
        <select id="langSelector" onchange="changeLanguage()">
            <option value="en">English</option>
            <option value="id">Indonesia</option>
            <option value="ms">Melayu</option>
            <option value="ja">Japanese</option>
        </select>
    </header>

    <div class="container">
        <h2 class="main-title" id="txt-member">MEMBER</h2>
        <div class="underline"></div>
        
        <h3 class="gen-title" id="txt-gen">KLP48 1st Generation Members</h3>

        <div class="member-grid">
            
            <a href="https://yurina.github.io" class="member-link">
                <div class="member-card">
                    <div class="img-box"><img src="path_ke_foto_yurina.jpg" alt="Yurina"></div>
                    <p class="member-name">Yurina</p>
                </div>
            </a>

            <a href="https://suzuha.github.io" class="member-link">
                <div class="member-card">
                    <div class="img-box"><img src="path_ke_foto_suzuha.jpg" alt="Suzuha"></div>
                    <p class="member-name">Suzuha</p>
                </div>
            </a>

            <a href="https://devi.github.io" class="member-link">
                <div class="member-card">
                    <div class="img-box"><img src="path_ke_foto_devi.jpg" alt="Devi"></div>
                    <p class="member-name">Devi</p>
                </div>
            </a>

            <a href="https://haruka.github.io" class="member-link">
                <div class="member-card">
                    <div class="img-box"><img src="path_ke_foto_haruka.jpg" alt="Haruka"></div>
                    <p class="member-name">Haruka</p>
                </div>
            </a>

            <a href="https://cocoa.github.io" class="member-link">
                <div class="member-card">
                    <div class="img-box"><img src="path_ke_foto_cocoa.jpg" alt="Cocoa"></div>
                    <p class="member-name">Cocoa</p>
                </div>
            </a>

            <a href="https://yishyan.github.io" class="member-link">
                <div class="member-card">
                    <div class="img-box"><img src="path_ke_foto_yishyan.jpg" alt="Yi Shyan"></div>
                    <p class="member-name">Yi Shyan</p>
                </div>
            </a>

        </div>
    </div>

    <script>
        const translations = {
            'en': {
                'member': 'MEMBER',
                'gen': 'KLP48 1st Generation Members'
            },
            'id': {
                'member': 'ANGGOTA',
                'gen': 'Anggota Generasi ke-1 KLP48'
            },
            'ms': {
                'member': 'AHLI',
                'gen': 'Ahli Generasi Pertama KLP48'
            },
            'ja': {
                'member': 'メンバー',
                'gen': 'KLP48 第1期生メンバー'
            }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelector').value;
            document.getElementById('txt-member').innerText = translations[lang].member;
            document.getElementById('txt-gen').innerText = translations[lang].gen;
        }
    </script>

</body>
</html>
