<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKT4X - Member Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"><style>
    :root {
        --mint-primary: #A8E6CF;  
        --mint-soft: #E8FFF8;  
        --mint-accent: #5CD6C0;  
        --mint-dark: #2F4F4F;  
        --shadow: rgba(92, 214, 192, 0.3);  
    }

    body {
        font-family: 'Arial', sans-serif;
        /* Ganti ke mint-soft agar latar belakang segar */
        background-color: var(--mint-soft);
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }

    /* --- NAVBAR --- */
    .navbar {
        width: 100%;
        height: 60px;
        background: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
        box-sizing: border-box;
        /* Shadow menggunakan warna mint-accent */
        box-shadow: 0 2px 10px var(--shadow);
        position: fixed;
        top: 0;
        z-index: 1000;
    }

    .logo img { height: 40px; }

    .nav-right { display: flex; align-items: center; gap: 20px; }

    .lang-container {
        display: flex;
        align-items: center;
        gap: 5px;
        color: var(--mint-accent);
    }

    #langSelect {
        border: 2px solid var(--mint-primary);
        border-radius: 5px;
        padding: 3px;
        color: var(--mint-dark);
        font-weight: bold;
        outline: none;
        background: white;
    }

    .menu-btn {
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .menu-btn span {
        width: 25px;
        height: 3px;
        background: var(--mint-accent);
        border-radius: 2px;
    }

    /* --- SIDEBAR --- */
    .sidebar {
        position: fixed;
        top: 0;
        right: -280px; 
        width: 280px;
        height: 100%;
        background: #fff;
        box-shadow: -2px 0 15px var(--shadow);
        transition: 0.3s ease-in-out;
        z-index: 1001;
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto;
    }

    .sidebar.active { right: 0; }

    .sidebar ul li a:hover { 
        color: var(--mint-accent); 
        padding-left: 5px; /* Sedikit animasi geser */
    }

    /* PROFILE DISPLAY */
    #profileContainer {
        margin-top: 20px;
        padding: 15px;
        background: white;
        border-radius: 12px;
        text-align: center;
        border: 2px dashed var(--mint-primary);
    }

    #profileContainer button {
        background: var(--mint-accent);
        color: white;
        border: none;
        padding: 7px 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
    }

    #profileContainer button:hover {
        background: var(--mint-dark);
    }

    /* --- MEMBER GRID SECTION --- */
    .main-content {
        margin-top: 100px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .main-title { 
        color: var(--mint-dark); 
        letter-spacing: 3px; 
        font-weight: 800;
    }

    .underline { 
        width: 50px; 
        height: 4px; 
        background: var(--mint-primary); 
        margin: 10px auto; 
        border-radius: 2px;
    }

    .gen-title { 
        color: var(--mint-dark); 
        opacity: 0.7;
    }

    .member-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 25px;
        width: 100%;
        max-width: 900px;
    }

    .img-box {
        border: 3px solid var(--mint-primary);
        border-radius: 20px; /* Lebih bulat agar terlihat soft */
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .member-link:hover .img-box {
        transform: translateY(-10px) scale(1.02);
        box-shadow: 0 15px 30px var(--shadow);
        border-color: var(--mint-accent);
    }

    .member-name { 
        margin-top: 12px; 
        font-weight: bold; 
        color: var(--mint-dark); 
        font-size: 1.1rem;
    }

    @media (min-width: 768px) {
        .member-grid { grid-template-columns: repeat(3, 1fr); }
    }
</style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>  
  
    <nav class="navbar">  
        <div class="logo">  
            <img src="https://i.imgur.com/yq2JRbl.png" alt="MKT4X Logo">  
        </div>  
        <div class="nav-right">  
            <div class="lang-container">  
                <i class="fas fa-globe"></i>  
                <select id="langSelect" onchange="changeLanguage()">  
                    <option value="id">Indonesia</option>  
                    <option value="en">English</option>  
                    <option value="jp">Japanese</option>  
                    <option value="my">Melayu</option>  
                </select>  
            </div>  
            <div class="menu-btn" onclick="toggleMenu()">  
                <span></span><span></span><span></span>  
            </div>  
        </div>  
    </nav>  
      
    <div class="sidebar" id="sidebar">  
        <div class="sidebar-logo">  
            <img src="https://i.imgur.com/yq2JRbl.png" alt="MKT4X Logo">  
        </div>  
        <ul id="menuList">  
            <li><a href="next.html"><i class="fas fa-home"></i> <span>Home</span></a></li>  
            <li><a href="#"><i class="fas fa-newspaper"></i> <span>Berita</span></a></li>  
            <li><a href="#"><i class="fas fa-calendar-alt"></i> <span>Jadwal</span></a></li>  
            <li><a href="member.html"><i class="fas fa-users"></i> <span>Member</span></a></li>
            <li><a href="#"><i class="fas fa-microphone"></i> <span>Setlist</span></a></li>  
            <hr style="opacity:0.1; margin:20px 0;">  
            <li><a href="#" class="reg-link"><i class="fas fa-heart"></i> <span>Fanclub</span></a></li>  
            <li><a href="#" id="authBtn"><i class="fas fa-sign-in-alt"></i> <span id="authText">Masuk</span></a></li>  
        </ul>  
      
        <div id="profileContainer">  
            <img id="profilePic" src="https://via.placeholder.com/60" alt="Profil">  
            <p id="profileName">User MKT4X</p>  
            <button onclick="editProfile()">Edit Profil</button>  
        </div>  
    </div>

    <main class="main-content">
        <div class="title-group">
            <h2 class="main-title" id="txt-member">MEMBER</h2>
            <div class="underline"></div>
            <h3 class="gen-title" id="txt-gen">KLP48 1st Generation Members</h3>
        </div>

        <div class="member-grid">
            <a href="https://yurina.github.io" class="member-link">
                <div class="img-box"><img src="yurina.jpg" alt="Yurina"></div>
                <p class="member-name">Yurina</p>
            </a>
            <a href="https://suzuha.github.io" class="member-link">
                <div class="img-box"><img src="suzuha.jpg" alt="Suzuha"></div>
                <p class="member-name">Suzuha</p>
            </a>
            <a href="https://devi.github.io" class="member-link">
                <div class="img-box"><img src="devi.jpg" alt="Devi"></div>
                <p class="member-name">Devi</p>
            </a>
            <a href="https://haruka.github.io" class="member-link">
                <div class="img-box"><img src="haruka.jpg" alt="Haruka"></div>
                <p class="member-name">Haruka</p>
            </a>
            <a href="https://cocoa.github.io" class="member-link">
                <div class="img-box"><img src="cocoa.jpg" alt="Cocoa"></div>
                <p class="member-name">Cocoa</p>
            </a>
            <a href="https://yishyan.github.io" class="member-link">
                <div class="img-box"><img src="yishyan.jpg" alt="Yi Shyan"></div>
                <p class="member-name">Yi Shyan</p>
            </a>
        </div>
    </main>

    <script>  
        function toggleMenu(){  
            document.getElementById('sidebar').classList.toggle('active');  
            document.getElementById('overlay').classList.toggle('active');  
        }

        const translations = {
            'en': { 'member': 'MEMBER', 'gen': 'KLP48 1st Generation Members' },
            'id': { 'member': 'ANGGOTA', 'gen': 'Anggota Generasi ke-1 KLP48' },
            'my': { 'member': 'AHLI', 'gen': 'Ahli Generasi Pertama KLP48' },
            'jp': { 'member': 'メンバー', 'gen': 'KLP48 第1期生メンバー' }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            document.getElementById('txt-member').innerText = translations[lang].member;
            document.getElementById('txt-gen').innerText = translations[lang].gen;
        }

        // EDIT PROFILE FUNCTION  
        function editProfile(){  
            const newName = prompt("Masukkan nama baru:", document.getElementById('profileName').innerText);  
            if(newName) {  
                document.getElementById('profileName').innerText = newName;  
                // nanti update ke Firestore  
                alert("Nama berhasil diperbarui!");  
            }  
        }  
    </script>

    <script type="module" src="firebase.js"></script>  
    <script type="module" src="auth.js"></script>  

</body>
</html>
