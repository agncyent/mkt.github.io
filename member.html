<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKT4X - Member Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Warna Peppermint Baru */
            --mint-primary: #A8E6CF;  
            --mint-soft: #E8FFF8;  
            --mint-accent: #5CD6C0;  
            --mint-dark: #2F4F4F;  
            --shadow: rgba(92, 214, 192, 0.3);
            
            /* Mapping ke variabel lama supaya struktur tidak rusak */
            --primary-green: var(--mint-accent);
            --dark-green: var(--mint-dark);
            --light-bg: var(--mint-soft);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        .navbar {
            width: 100%;
            height: 60px;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            box-shadow: 0 2px 5px var(--shadow);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .logo img { height: 40px; }

        .nav-right { display: flex; align-items: center; gap: 20px; }

        .lang-container {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--primary-green);
        }

        #langSelect {
            border: 2px solid var(--mint-primary);
            border-radius: 5px;
            padding: 3px;
            color: var(--dark-green);
            font-weight: bold;
            outline: none;
            background: #fff;
        }

        .menu-btn {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .menu-btn span {
            width: 25px;
            height: 3px;
            background: var(--primary-green);
            border-radius: 2px;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            top: 0;
            right: -280px; 
            width: 280px;
            height: 100%;
            background: #fff;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            z-index: 1001;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .sidebar.active { right: 0; }

        .sidebar-logo { text-align: center; margin-bottom: 20px; }
        .sidebar-logo img { height: 50px; }

        .sidebar ul { list-style: none; padding: 0; }
        .sidebar ul li { margin: 15px 0; }
        .sidebar ul li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
        }

        .sidebar ul li a:hover { color: var(--primary-green); }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
        }

        .overlay.active { display: block; }

        /* PROFILE DISPLAY */
        #profileContainer {
            margin-top: 20px;
            padding: 15px;
            background: #fff;
            border-radius: 10px;
            text-align: center;
            border: 2px dashed var(--mint-primary);
        }
        #profilePic { 
            width: 60px; height: 60px; 
            border-radius: 50%; 
            background: #ddd;
            margin: 0 auto 10px;
            display: block;
            object-fit: cover;
        }
        #profileName { font-weight: bold; margin: 5px 0; color: var(--dark-green); }
        #profileContainer button {
            background: var(--mint-accent);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* --- MEMBER GRID SECTION --- */
        .main-content {
            margin-top: 100px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-group { text-align: center; margin-bottom: 40px; }
        .main-title { color: var(--dark-green); letter-spacing: 2px; margin: 0; font-weight: bold; }
        .underline { width: 50px; height: 4px; background: var(--mint-primary); margin: 10px auto; border-radius: 2px; }
        .gen-title { color: var(--dark-green); font-size: 1rem; opacity: 0.8; }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            width: 100%;
            max-width: 900px;
        }

        .member-link { text-decoration: none; color: inherit; text-align: center; }

        .img-box {
            border: 3px solid var(--mint-primary);
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 3/4;
            background: #fff;
            transition: 0.3s;
        }

        .member-link:hover .img-box {
            transform: translateY(-8px);
            box-shadow: 0 8px 20px var(--shadow);
            border-color: var(--mint-accent);
        }

        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .member-name { margin-top: 12px; font-weight: bold; color: var(--dark-green); font-size: 1.1rem; }

        @media (min-width: 768px) {
            .member-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>  
  
    <nav class="navbar">  
        <div class="logo">  
            <img src="https://i.imgur.com/yq2JRbl.png" alt="MKT4X Logo">  
        </div>  
        <div class="nav-right">  
            <div class="lang-container">  
                <i class="fas fa-globe"></i>  
                <select id="langSelect" onchange="changeLanguage()">  
                    <option value="id">Indonesia</option>  
                    <option value="en">English</option>  
                    <option value="jp">Japanese</option>  
                    <option value="my">Melayu</option>  
                </select>  
            </div>  
            <div class="menu-btn" onclick="toggleMenu()">  
                <span></span><span></span><span></span>  
            </div>  
        </div>  
    </nav>  
      
    <div class="sidebar" id="sidebar">  
        <div class="sidebar-logo">  
            <img src="https://i.imgur.com/yq2JRbl.png" alt="MKT4X Logo">  
        </div>  
        <ul id="menuList">  
            <li><a href="index.html"><i class="fas fa-home"></i> <span>Home</span></a></li>  
            <li><a href="berita.html"><i class="fas fa-newspaper"></i> <span>Berita</span></a></li>  
            <li><a href="jadwal.html"><i class="fas fa-calendar-alt"></i> <span>Jadwal</span></a></li>  
            <li><a href="member.html"><i class="fas fa-users"></i> <span>Member</span></a></li>
            <li><a href="setlist.html"><i class="fas fa-microphone"></i> <span>Setlist</span></a></li>  
            <hr style="opacity:0.1; margin:20px 0;">  
            <li><a href="fanclub.html" class="reg-link"><i class="fas fa-heart"></i> <span>Fanclub</span></a></li>  
            <li><a href="#" id="authBtn"><i class="fas fa-sign-in-alt"></i> <span id="authText">Masuk</span></a></li>  
        </ul>  
      
        <div id="profileContainer">  
            <img id="profilePic" src="https://via.placeholder.com/60" alt="Profil">  
            <p id="profileName">User MKT4X</p>  
            <button onclick="editProfile()">Edit Profil</button>  
        </div>  
    </div>

    <main class="main-content">
        <div class="title-group">
            <h2 class="main-title" id="txt-member">MEMBER</h2>
            <div class="underline"></div>
            <h3 class="gen-title" id="txt-gen">MKT4X 1st Generation Members</h3>
        </div>

        <div class="member-grid">
            <a href="https://yurina.github.io" class="member-link">
                <div class="img-box"><img src="yurina.jpg" alt="Yurina"></div>
                <p class="member-name">Yurina</p>
            </a>
            <a href="https://suzuha.github.io" class="member-link">
                <div class="img-box"><img src="suzuha.jpg" alt="Suzuha"></div>
                <p class="member-name">Suzuha</p>
            </a>
            <a href="https://devi.github.io" class="member-link">
                <div class="img-box"><img src="devi.jpg" alt="Devi"></div>
                <p class="member-name">Devi</p>
            </a>
            <a href="https://haruka.github.io" class="member-link">
                <div class="img-box"><img src="haruka.jpg" alt="Haruka"></div>
                <p class="member-name">Haruka</p>
            </a>
            <a href="https://cocoa.github.io" class="member-link">
                <div class="img-box"><img src="cocoa.jpg" alt="Cocoa"></div>
                <p class="member-name">Cocoa</p>
            </a>
            <a href="https://yishyan.github.io" class="member-link">
                <div class="img-box"><img src="yishyan.jpg" alt="Yi Shyan"></div>
                <p class="member-name">Yi Shyan</p>
            </a>
        </div>
    </main>

    <script>  
        function toggleMenu(){  
            document.getElementById('sidebar').classList.toggle('active');  
            document.getElementById('overlay').classList.toggle('active');  
        }

        const translations = {
            'en': { 'member': 'MEMBER', 'gen': 'MKT4X 1st Generation Members' },
            'id': { 'member': 'ANGGOTA', 'gen': 'Anggota Generasi ke-1 MKT4X' },
            'my': { 'member': 'AHLI', 'gen': 'Ahli Generasi Pertama MKT4X' },
            'jp': { 'member': 'メンバー', 'gen': 'MKT4X 第1期生メンバー' }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            document.getElementById('txt-member').innerText = translations[lang].member;
            document.getElementById('txt-gen').innerText = translations[lang].gen;
        }

        function editProfile(){  
            const newName = prompt("Masukkan nama baru:", document.getElementById('profileName').innerText);  
            if(newName) {  
                document.getElementById('profileName').innerText = newName;  
                alert("Nama berhasil diperbarui!");  
            }  
        }  
    </script>

    <script type="module" src="firebase.js"></script>  
    <script type="module" src="auth.js"></script>  

</body>
</html>
