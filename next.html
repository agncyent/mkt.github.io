<!DOCTYPE html>    
<html lang="id">    
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Premium Fanclub | MKT4X</title>    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">    
      
<style>    
    :root{    
        --mint-primary:#A8E6CF;    
        --mint-soft:#E8FFF8;    
        --mint-accent:#5CD6C0;    
        --mint-dark:#2F4F4F;    
        --white:#ffffff;    
        --shadow:rgba(92, 214, 192, 0.3);    
        --premium-green:#2E7D32;    
    }    
    *{box-sizing:border-box;}    
    body{    
        margin:0; background:linear-gradient(180deg,#E8FFF8 0%,#ffffff 100%);    
        color:var(--mint-dark); font-family:'Inter',sans-serif; overflow-x:hidden;    
    }    
    
    /* NAVBAR */    
    .navbar{ display:flex; justify-content:space-between; align-items:center; padding:15px 5%; background:var(--white); box-shadow:0 5px 20px var(--shadow); position:sticky; top:0; z-index:1000; height:70px; }    
    .logo img{ height:32px; width:auto; }    
    .nav-right{ display:flex; align-items:center; gap:20px; }    
    .lang-container{ display:flex; align-items:center; gap:5px; cursor:pointer; color:var(--mint-accent); }    
    select{ background:transparent; color:var(--mint-dark); border:none; outline:none; font-size:0.85rem; font-weight:600; cursor:pointer; }    
    .menu-btn{ cursor:pointer; display:flex; flex-direction:column; gap:4px; z-index:10001; }    
    .menu-btn span{ width:22px; height:2px; background:var(--mint-dark); transition:0.3s; }    
    
    /* SIDEBAR */    
    .sidebar{ position:fixed; top:0; right:-280px; width:280px; height:100vh; background:var(--white); border-left:2px solid var(--mint-primary); transition:0.3s ease; z-index:9999; padding:40px 25px; box-shadow:-10px 0 30px var(--shadow); }    
    .sidebar.active{ right:0; }    
    .sidebar-logo{ display:flex; justify-content:center; margin-bottom:35px; }    
    .sidebar-logo img{ width:140px; height:auto; object-fit:contain; }    
    .sidebar ul{ list-style:none; padding:0; }    
    .sidebar ul li{ margin-bottom:20px; }    
    .sidebar ul li a{ color:var(--mint-dark); text-decoration:none; font-size:1rem; display:flex; align-items:center; gap:15px; font-weight:500; }    
    .sidebar ul li a i { width: 20px; text-align: center; color: #555; }    
    .reg-link{ color:var(--mint-accent) !important; font-weight:bold; }    
    
    /* PROFILE DISPLAY */    
        #profileContainer {    
            margin-top: 30px;    
            padding: 15px;    
            background: #fff;    
            border-radius: 10px;    
            text-align: center;    
            border: 2px dashed var(--mint-primary);    
            margin-bottom: 20px;   
        }    
        #profilePic {     
            width: 60px; height: 60px;     
            border-radius: 50%;     
            background: #ddd;    
            margin: 0 auto 10px;    
            display: block;    
            object-fit: cover;    
        }    
        #profileName { font-weight: bold; margin: 5px 0; color: var(--mint-accent); font-size: 0.9rem; }    
        #profileContainer button {    
            background: var(--mint-accent);    
            color: white;    
            border: none;    
            padding: 5px 12px;    
            border-radius: 4px;    
            cursor: pointer;    
            font-size: 0.8rem;    
            font-weight: bold;    
        }    
    
    /* FORM CARD */    
    .container{ padding:25px 5%; display:flex; justify-content:center; }    
    .fc-card { background: #fff; width: 100%; max-width: 480px; border-radius: 40px; padding: 35px 25px; border: 2px solid var(--mint-primary); box-shadow: 0 10px 30px var(--shadow); text-align: center; }    
        
    .fc-header h2 { color: var(--premium-green); font-weight: 800; margin: 0; font-size: 2rem; border-bottom: 3px solid var(--mint-primary); display: inline-block; padding-bottom: 5px; }    
    .badge-main { background: var(--premium-green); color: white; padding: 6px 20px; border-radius: 20px; font-size: 0.75rem; display: inline-block; margin: 15px 0; font-weight: 800; text-transform: uppercase; }    
        
    .form-group { text-align: left; margin-bottom: 15px; }    
    .form-group label { display: block; font-weight: bold; font-size: 0.85rem; color: var(--premium-green); margin-bottom: 6px; }    
    .form-group input { width: 100%; padding: 12px 15px; border: 1.5px solid #E0E0E0; border-radius: 12px; outline: none; background: #F9FFF9; font-family: inherit; }    
    
    /* OSHI GRID */    
    .oshi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 25px 0; }    
    .oshi-item { border: 1.5px solid #E8FFF8; border-radius: 20px; padding: 15px; background: #F9FFF9; cursor: pointer; transition: 0.3s; position: relative; }    
    .oshi-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }    
    .oshi-item p { margin: 0; font-weight: 800; font-size: 0.95rem; color: #2E7D32; }    
    .gen-tag { font-size: 0.6rem; background: #C8E6C9; color: #1B5E20; padding: 3px 10px; border-radius: 10px; font-weight: bold; display: inline-block; margin-top: 5px; }    
    .oshi-item input { position: absolute; opacity: 0; }    
    .oshi-item.selected { border-color: var(--premium-green); background: #E8F5E9; transform: translateY(-3px); box-shadow: 0 5px 15px var(--shadow); }    
    
    .btn-submit { width: 100%; background: var(--premium-green); color: white; border: none; padding: 16px; border-radius: 35px; font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 10px; transition: 0.3s; }    
    .btn-submit:hover { opacity: 0.9; }    
    
    /* OTP SECTION */    
    #otpSection { display: none; margin-top: 25px; padding: 20px; border: 2px dashed var(--premium-green); border-radius: 20px; background: #F1F8E9; }    
    #generatedOTP { font-size: 2.2rem; letter-spacing: 8px; color: var(--premium-green); margin: 15px 0; font-weight: 800; }    
        
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(168,230,207,0.4); backdrop-filter: blur(4px); display: none; z-index: 9998; }    
    .overlay.active { display: block; }    
</style>    
</head>    
    
<body>    
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>    
    
<nav class="navbar">    
    <div class="logo"><img src="https://i.imgur.com/yq2JRbl.png" alt="MKT4X Logo"></div>    
    <div class="nav-right">    
        <div class="lang-container">    
            <i class="fas fa-globe"></i>    
            <select id="langSelect" onchange="translatePage()">    
                <option value="id">Indonesia</option>    
                <option value="en">English</option>    
                <option value="jp">Japanese</option>    
                <option value="my">Melayu</option>    
            </select>    
        </div>    
        <div class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>    
    </div>    
</nav>    
    
<div class="sidebar" id="sidebar">    
    <div class="sidebar-logo">    
        <img src="https://i.imgur.com/yq2JRbl.png" alt="MKT4X Logo">    
    </div>  
  
    <ul id="menuList">    
        <li><a href="index.html"><i class="fas fa-home"></i> <span>Home</span></a></li>    
        <li><a href="berita.html"><i class="fas fa-newspaper"></i> <span>Berita</span></a></li>    
        <li><a href="jadwal.html"><i class="fas fa-calendar-alt"></i> <span>Jadwal</span></a></li>    
        <li><a href="member.html"><i class="fas fa-users"></i><span>Member</span></a></li>    
        <li><a href="setlist.html"><i class="fas fa-microphone"></i> <span>Setlist</span></a></li>    
        <hr style="opacity:0.1; margin:20px 0;">    
        <li><a href="fanclub.html" class="reg-link"><i class="fas fa-heart"></i> <span>Fanclub</span></a></li>    
        <li><a href="#" id="authBtn"><i class="fas fa-sign-in-alt"></i> <span id="authText">Masuk</span></a></li>    
    </ul>    

    <div id="profileContainer">    
        <img src="https://via.placeholder.com/60" id="profilePic" alt="Profile">    
        <div id="profileName">Farhan Maulana1845</div>    
        <button onclick="editProfile()">Edit Profil</button>    
    </div>  
</div>    
    
<main class="container">    
    <div class="fc-card">    
        <div class="fc-header">    
            <h2>MKT4X</h2>    
            <div style="margin: 15px 0;">    
                <img src="https://i.imgur.com/TDUfxDZ.png" alt="MKT4X Logo" style="width: 70px; height: auto;">    
            </div>    
            <p id="subTitle" style="font-weight: 800; color: #2E7D32; margin: 0; font-size: 1.5rem;">Premium Fanclub</p>    
            <p style="font-size: 0.8rem; color: #666; margin-top: 5px;">Generasi 1 • MKT4X Entertainment</p>    
            <div class="badge-main">GENERASI 1</div>    
        </div>    
    
        <form id="premiumForm" style="margin-top: 20px;">    
            <div class="form-group">    
                <label id="lblUser">Username</label>    
                <input type="text" id="username" placeholder="Contoh: kiara_fans" required>    
            </div>    
            <div class="form-group">    
                <label id="lblName">Nama Lengkap</label>    
                <input type="text" id="fullname" placeholder="Sesuai KTP/ID" required>    
            </div>    
            <div class="form-group">    
                <label id="lblBirth">Tanggal Lahir</label>    
                <input type="date" id="birthdate" required>    
            </div>    
            <div class="form-group">    
                <label id="lblCity">Kota</label>    
                <input type="text" id="city" placeholder="Kota domisili" required>    
            </div>    
            <div class="form-group">    
                <label>Email</label>    
                <input type="email" id="email" placeholder="Contoh: fans@email.com" required>    
            </div>    
    
            <p id="lblOshi" style="font-weight: bold; color: var(--premium-green); margin: 25px 0 10px;">✨ Pilih Oshi-mu ✨</p>    
            <div class="oshi-grid">    
                <label class="oshi-item"><input type="radio" name="oshi" value="Kiara"><img src="https://i.imgur.com/KjU8YTn.png" alt="Kiara"><p>Kiara</p><span class="gen-tag">GENERASI 1</span></label>    
                <label class="oshi-item"><input type="radio" name="oshi" value="Agnes"><img src="https://i.imgur.com/9iiTqah.png" alt="Agnes"><p>Agnes</p><span class="gen-tag">GENERASI 1</span></label>    
                <label class="oshi-item"><input type="radio" name="oshi" value="Thea"><img src="https://i.imgur.com/hmsc4g6.png" alt="Thea"><p>Thea</p><span class="gen-tag">GENERASI 1</span></label>    
                <label class="oshi-item"><input type="radio" name="oshi" value="Khen"><img src="https://i.imgur.com/EGuBLUf.png" alt="Khen"><p>Khen</p><span class="gen-tag">GENERASI 1</span></label>    
                <label class="oshi-item"><input type="radio" name="oshi" value="Chalista"><img src="https://i.imgur.com/1m6d2ml.png" alt="Chalista"><p>Chalista</p><span class="gen-tag">GENERASI 1</span></label>    
                <label class="oshi-item"><input type="radio" name="oshi" value="Melisha"><img src="https://i.imgur.com/LgfDdI7.png" alt="Melisha"><p>Melisha</p><span class="gen-tag">GENERASI 1</span></label>    
            </div>    
    
            <button type="button" class="btn-submit" id="btnRequest" onclick="requestOTP()">Dapatkan Kode OTP</button>    
        </form>    
    
        <div id="otpSection">    
            <p id="lblOtpTitle" style="font-weight: bold; color:#1B5E20; font-size: 0.8rem;">KODE VERIFIKASI ANDA:</p>    
            <h2 id="generatedOTP">------</h2>    
            <div class="form-group">    
                <input type="text" id="inputOTP" placeholder="Masukkan 6 digit kode" style="text-align:center; font-weight:bold; font-size:1.2rem;">    
            </div>    
            <button class="btn-submit" id="btnVerify" onclick="verifyOTP()">Verifikasi & Upgrade</button>    
            <p id="timer" style="color:#D32F2F; font-size:0.85rem; margin-top:10px; font-weight:bold;">Sisa waktu: 60 detik</p>    
        </div>    
            
        <p style="font-size: 0.7rem; color: #bbb; margin-top: 30px; letter-spacing: 1px;">MKT4X ENTERTAINMENT • SINCE 2024</p>    
    </div>    
</main>    
    
<script>    
function toggleMenu(){    
    document.getElementById('sidebar').classList.toggle('active');    
    document.getElementById('overlay').classList.toggle('active');    
}    
    
document.querySelectorAll('.oshi-item').forEach(item => {    
    item.addEventListener('click', function(){    
        document.querySelectorAll('.oshi-item').forEach(i => i.classList.remove('selected'));    
        this.classList.add('selected');    
        this.querySelector('input').checked = true;    
    });    
});    
    
const dict = {    
    id: { sub: "Premium Fanclub", lblUser: "Username", lblName: "Nama Lengkap", lblBirth: "Tanggal Lahir", lblCity: "Kota", lblOshi: "✨ Pilih Oshi-mu ✨", btnOtp: "Dapatkan Kode OTP", otpTitle: "KODE VERIFIKASI ANDA:", btnVerify: "Verifikasi & Upgrade", list: ["Home","Berita","Jadwal","Member","Setlist","Fanclub","Masuk"] },    
    en: { sub: "Premium Fanclub", lblUser: "Username", lblName: "Full Name", lblBirth: "Date of Birth", lblCity: "City", lblOshi: "✨ Pick Your Oshi ✨", btnOtp: "Get OTP Code", otpTitle: "YOUR VERIFICATION CODE:", btnVerify: "Verify & Upgrade", list: ["Home","News","Schedule","Member","Setlist","Fanclub","Login"] },    
    jp: { sub: "プレミアムファンクラブ", lblUser: "ユーザー名", lblName: "氏名", lblBirth: "生年月日", lblCity: "都市", lblOshi: "推しを選んでください", btnOtp: "OTP取得", otpTitle: "認証コード", btnVerify: "認証", list: ["Home","ニュース","スケジュール","メンバー","セットリスト","ファンクラブ","ログイン"] },    
    my: { sub: "Kelab Peminat Premium", lblUser: "Nama Pengguna", lblName: "Nama Penuh", lblBirth: "Tarikh Lahir", lblCity: "Bandar", lblOshi: "Pilih Oshi Anda", btnOtp: "Dapatkan OTP", otpTitle: "KOD PENGESAHAN", btnVerify: "Sahkan", list: ["Home","Berita","Jadual","Ahli","Senarai Lagu","Kelab Peminat","Masuk"] }    
};    
    
function translatePage() {    
    const l = document.getElementById('langSelect').value;    
    document.getElementById('subTitle').innerText = dict[l].sub;    
    document.getElementById('lblUser').innerText = dict[l].lblUser;    
    document.getElementById('lblName').innerText = dict[l].lblName;    
    document.getElementById('lblBirth').innerText = dict[l].lblBirth;    
    document.getElementById('lblCity').innerText = dict[l].lblCity;    
    document.getElementById('lblOshi').innerText = dict[l].lblOshi;    
    document.getElementById('btnRequest').innerText = dict[l].btnOtp;    
    document.getElementById('lblOtpTitle').innerText = dict[l].otpTitle;    
    document.getElementById('btnVerify').innerText = dict[l].btnVerify;    
    const spans = document.querySelectorAll('#menuList span');    
    dict[l].list.forEach((teks, i) => { if(spans[i]) spans[i].innerText = teks; });    
}    
    
let otpTimer;    
function requestOTP(){    
    const requiredFields = ["username", "fullname", "birthdate", "city", "email"];    
    const isFormValid = requiredFields.every(id => document.getElementById(id).value.trim() !== "");    
    const isOshiSelected = document.querySelector('input[name="oshi"]:checked');    
    
    if(!isFormValid || !isOshiSelected) {    
        alert("Isi dulu semua formatnya, jangan ada yang kosong!");    
        return;    
    }    
    
    document.getElementById('btnRequest').style.display = 'none';    
    document.getElementById('otpSection').style.display = 'block';    
    const code = Math.floor(100000 + Math.random() * 900000);    
    document.getElementById('generatedOTP').innerText = code;    
        
    let seconds = 60;    
    document.getElementById('timer').innerText = `Sisa waktu: ${seconds} detik`;    
    clearInterval(otpTimer);    
    otpTimer = setInterval(() => {    
        seconds--;    
        document.getElementById('timer').innerText = `Sisa waktu: ${seconds} detik`;    
        if(seconds <= 0){    
            clearInterval(otpTimer);    
            alert("Waktu habis! Silakan minta kode baru.");    
            location.reload();    
        }    
    }, 1000);    
}    
    
function verifyOTP(){    
    const input = document.getElementById('inputOTP').value;    
    const correct = document.getElementById('generatedOTP').innerText;    
    
    if(input === correct){    
        clearInterval(otpTimer);    
        alert("Selamat! Kamu sekarang Member PREMIUM MKT4X.");    
        window.location.href = "index.html";    
    } else {    
        alert("Kode salah! Cek lagi pelan-pelan.");    
    }    
}    

function editProfile(){      
    const newName = prompt("Masukkan nama baru:", document.getElementById('profileName').innerText);      
    if(newName) {      
        document.getElementById('profileName').innerText = newName;      
        alert("Nama berhasil diperbarui!");      
    }      
}      
</script>    
    <!-- FIREBASE & AUTH -->
<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
</body>    
</html>
