<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Fanclub | MKT4X</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--mint-primary:#A8E6CF;
--mint-soft:#E8FFF8;
--mint-accent:#5CD6C0;
--mint-dark:#2F4F4F;
--white:#ffffff;
--shadow:rgba(92,214,192,0.3);
--premium-green:#2E7D32;
}

*{box-sizing:border-box;}
body{
margin:0;
background:linear-gradient(180deg,#E8FFF8 0%,#ffffff 100%);
color:var(--mint-dark);
font-family:'Inter',sans-serif;
overflow-x:hidden;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
background:var(--white);
box-shadow:0 5px 20px var(--shadow);
position:sticky;
top:0;
z-index:1000;
height:70px;
}

.logo img{height:32px;width:auto;}
.nav-right{display:flex;align-items:center;gap:20px;}
.lang-container{display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--mint-accent);}
select{background:transparent;color:var(--mint-dark);border:none;outline:none;font-size:0.85rem;font-weight:600;cursor:pointer;}
.menu-btn{cursor:pointer;display:flex;flex-direction:column;gap:4px;z-index:10001;}
.menu-btn span{width:22px;height:2px;background:var(--mint-dark);}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
right:-280px;
width:280px;
height:100vh;
background:var(--white);
border-left:2px solid var(--mint-primary);
transition:0.3s;
z-index:9999;
padding:40px 25px;
box-shadow:-10px 0 30px var(--shadow);
display:flex;
flex-direction:column;
}

.sidebar.active{right:0;}
.sidebar-logo{display:flex;justify-content:center;margin-bottom:35px;}
.sidebar-logo img{width:140px;}
.sidebar ul{list-style:none;padding:0;}
.sidebar ul li{margin-bottom:20px;}
.sidebar ul li a{color:var(--mint-dark);text-decoration:none;font-size:1rem;display:flex;align-items:center;gap:15px;font-weight:500;}
.sidebar ul li a i{width:20px;text-align:center;color:#555;}
.reg-link{color:var(--mint-accent)!important;font-weight:bold;}

/* PROFILE */
#profileContainer{
margin-top:auto;
padding:15px;
background:#fff;
border-radius:10px;
text-align:center;
border:2px dashed var(--mint-primary);
}
#profilePic{width:60px;height:60px;border-radius:50%;background:#ddd;margin:0 auto 10px;display:block;object-fit:cover;}
#profileName{font-weight:bold;margin:5px 0;}
#profileContainer button{background:var(--mint-accent);color:white;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem;font-weight:bold;}

/* OVERLAY */
.overlay{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(168,230,207,0.4);
backdrop-filter:blur(4px);
display:none;
z-index:9998;
}
.overlay.active{display:block;}
</style>
</head>

<body>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="navbar">
<div class="logo">
<img src="https://i.imgur.com/yq2JRbl.png" alt="MKT4X Logo">
</div>
<div class="nav-right">
<div class="lang-container">
<i class="fas fa-globe"></i>
<select id="langSelect" onchange="translatePage()">
<option value="id">Indonesia</option>
<option value="en">English</option>
<option value="jp">Japanese</option>
<option value="my">Melayu</option>
</select>
</div>
<div class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>
</div>
</nav>

<div class="sidebar" id="sidebar">

<div class="sidebar-logo">
<img src="https://i.imgur.com/yq2JRbl.png" alt="MKT4X Logo">
</div>

<ul id="menuList">
<li><a href="index.html"><i class="fas fa-home"></i><span>Home</span></a></li>
<li><a href="berita.html"><i class="fas fa-newspaper"></i><span>Berita</span></a></li>
<li><a href="jadwal.html"><i class="fas fa-calendar-alt"></i><span>Jadwal</span></a></li>
<li><a href="member.html"><i class="fas fa-users"></i><span>Member</span></a></li>
<li><a href="setlist.html"><i class="fas fa-microphone"></i><span>Setlist</span></a></li>

<hr style="opacity:0.1;margin:20px 0;">

<li><a href="fanclub.html" class="reg-link"><i class="fas fa-heart"></i><span>Fanclub</span></a></li>
<li><a href="#" id="authBtn"><i class="fas fa-sign-in-alt"></i><span id="authText">Masuk</span></a></li>
</ul>

<!-- PROFIL PINDAH KE BAWAH LOGIN -->
<div id="profileContainer">
<img src="https://via.placeholder.com/60" id="profilePic" alt="Profile">
<div id="profileName">Guest User</div>
<button onclick="editProfile()">Edit Profil</button>
</div>

</div>

<script>
// Toggle sidebar
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

// Edit profile
function editProfile(){
const newName = prompt("Masukkan nama baru:", document.getElementById("profileName").innerText);
if(newName){
document.getElementById("profileName").innerText = newName;
alert("Nama berhasil diperbarui!");
}

// Contoh tambahan: bisa ditambah update ke Firebase di sini
}

// Translation placeholder (sama seperti sebelumnya)
function translatePage(){
const lang = document.getElementById("langSelect").value;
const dict = {
id:["Home","Berita","Jadwal","Member","Setlist","Fanclub","Masuk"],
en:["Home","News","Schedule","Member","Setlist","Fanclub","Login"]
};
const spans = document.querySelectorAll("#menuList span");
dict[lang].forEach((t,i)=>{if(spans[i]) spans[i].innerText = t;});
}
</script>

<!-- FIREBASE & AUTH -->
<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>

</body>
</html>
