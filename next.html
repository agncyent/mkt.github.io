<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Fanclub | MKT4X</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#e8fff8,#ffffff);
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:white;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.menu-btn{
cursor:pointer;
}

.menu-btn span{
display:block;
width:20px;
height:2px;
background:#333;
margin:4px 0;
}

/* SIDEBAR */

.sidebar{
position:fixed;
right:-260px;
top:0;
width:260px;
height:100%;
background:white;
padding:30px;
transition:0.3s;
box-shadow:-10px 0 30px rgba(0,0,0,0.1);
}

.sidebar.active{
right:0;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar li{
margin:15px 0;
}

.sidebar a{
text-decoration:none;
color:#333;
}

/* PROFILE */

#profileContainer{
margin-top:25px;
padding:15px;
border-radius:10px;
border:2px dashed #a8e6cf;
text-align:center;
}

#profilePic{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
}

#profileName{
font-weight:bold;
margin:8px 0;
}

#profileContainer button{
background:#5cd6c0;
border:none;
color:white;
padding:6px 14px;
border-radius:6px;
cursor:pointer;
}

/* CARD */

.container{
display:flex;
justify-content:center;
padding:30px 10px;
}

.card{
background:white;
border-radius:25px;
padding:30px;
width:100%;
max-width:450px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.card h2{
text-align:center;
}

/* FORM */

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
}

button.submit{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:20px;
margin-top:15px;
}

</style>
</head>

<body>

<nav class="navbar">

<div>MKT4X</div>

<div class="menu-btn" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>

</nav>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<ul>

<li><a href="#">Home</a></li>
<li><a href="#">Berita</a></li>
<li><a href="#">Jadwal</a></li>
<li><a href="#">Member</a></li>
<li><a href="#">Setlist</a></li>
<li><a href="#">Fanclub</a></li>

</ul>

<!-- PROFILE TAMBAHAN -->

<div id="profileContainer">
<img id="profilePic" src="https://i.imgur.com/yq2JRbl.png">
<p id="profileName">Username</p>
<button onclick="editProfile()">Edit Profil</button>
</div>

</div>

<!-- FANCLUB FORM -->

<div class="container">

<div class="card">

<h2>MKT4X</h2>
<p style="text-align:center;">Premium Fanclub</p>

<label>Username</label>
<input type="text" placeholder="Contoh: kiara_fans">

<label>Nama Lengkap</label>
<input type="text" placeholder="Sesuai KTP/ID">

<label>Tanggal Lahir</label>
<input type="date">

<label>Kota</label>
<input type="text" placeholder="Kota domisili">

<label>Email</label>
<input type="email" placeholder="fans@email.com">

<h3 style="text-align:center;">✨ Pilih Oshi-mu ✨</h3>

<select>
<option>Kiara</option>
<option>Agnes</option>
<option>Thea</option>
<option>Khen</option>
<option>Chalista</option>
<option>Melisha</option>
</select>

<button class="submit">Dapatkan Kode OTP</button>

</div>

</div>

<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

function editProfile(){

let nama = prompt("Masukkan nama baru:");

if(nama){
document.getElementById("profileName").innerText = nama;
}

}

</script>
    <script type="module" src="firebase.js"></script>  
    <script type="module" src="auth.js"></script>  
</body>
</html>
